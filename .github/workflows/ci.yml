name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Miemboost.sln

      - name: Build
        run: dotnet build Miemboost.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Miemboost.Tests/Miemboost.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish app
        run: dotnet publish src/Miemboost.App/Miemboost.App.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts/publish/Miemboost-win-x64
