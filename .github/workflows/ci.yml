name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Miemboost.sln

      - name: Build
        run: dotnet build Miemboost.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Miemboost.Tests/Miemboost.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish app
        run: dotnet publish src/Miemboost.App/Miemboost.App.csproj --configuration Release --runtime win-x64 --self-contained false --output artifacts/publish/Miemboost-win-x64

      - name: Package app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/packages | Out-Null
          Compress-Archive -Path artifacts/publish/Miemboost-win-x64/* -DestinationPath artifacts/packages/Miemboost-win-x64.zip -Force

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Miemboost-win-x64
          path: artifacts/packages/Miemboost-win-x64.zip
